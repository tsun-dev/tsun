# Tsun Security Scan - GitLab CI Template

stages:
  - security

tsun-security-scan:
  stage: security
  image: docker:24-dind
  
  services:
    - docker:24-dind
  
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    # Set your target URL
    APP_URL: "https://staging.example.com"
  
  before_script:
    # Install Tsun
    - apk add --no-cache curl bash
    - curl -L https://github.com/tsun-dev/tsun/releases/latest/download/tsun-linux-x86_64 -o /usr/local/bin/tsun
    - chmod +x /usr/local/bin/tsun
    - tsun doctor
  
  script:
    # CI profile, fast scans (10-15 min)
    - |
      tsun scan \
        --target $APP_URL \
        --profile ci \
        --engine zap \
        --format sarif \
        --output gl-sast-report.json \
        --exit-on-severity high
  
  artifacts:
    reports:
      # GitLab SAST format
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    expire_in: 30 days
    when: always
  
  # Run on merge requests and main branch
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule" # Weekly scans
